services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: points
      POSTGRES_USER: points
      POSTGRES_PASSWORD: points
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U points -d points"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/points
      SPRING_DATASOURCE_USERNAME: points
      SPRING_DATASOURCE_PASSWORD: points
      PG_MOCK_FAIL_RATE: "0.0"
      PG_MOCK_DELAY_MS: "0"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/products || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      db:
        condition: service_healthy

  seeder:
    build:
      context: ./load-test
      dockerfile: Dockerfile.seed
    volumes:
      - ./load-test:/scripts
    command: bash /scripts/seed.sh
    depends_on:
      api:
        condition: service_healthy

  k6:
    image: grafana/k6
    volumes:
      - ./load-test:/scripts
    environment:
      - TARGET_VUS=${TARGET_VUS:-100}
    command: run -e BASE_URL=http://api:8080/api -e TARGET_VUS=${TARGET_VUS:-100} /scripts/load-test.js
    depends_on:
      seeder:
        condition: service_completed_successfully
      report:
        condition: service_started

  report:
    image: nginx:alpine
    volumes:
      - ./load-test/results:/usr/share/nginx/html
      - ./load-test/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "3000:80"
