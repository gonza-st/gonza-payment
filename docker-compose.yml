# =============================================================================
# 사용법:
#   docker compose up k6                                               부하 테스트
#   PG_MOCK_DELAY_MS=2000 docker compose up k6-idem                     중복결제 시나리오 테스트
#   docker compose --profile balance-race up k6-balance-race            잔액 경합 시나리오 테스트
#   docker compose --profile consume-race up k6-consume-race            기프티콘 동시 Consume 테스트
#
#   TARGET_VUS=1000 docker compose up k6              VU 수 조절
#
# 최초 실행 또는 코드 변경 시에만 --build 추가
# 결과 확인: localhost:19000
# =============================================================================

x-api-env: &api-env
  SPRING_PROFILES_ACTIVE: docker
  SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/points
  SPRING_DATASOURCE_USERNAME: points
  SPRING_DATASOURCE_PASSWORD: points
  PG_MOCK_FAIL_RATE: "0.0"
  PG_MOCK_DELAY_MS: "${PG_MOCK_DELAY_MS:-0}"
  # 시나리오 1: 채널별 딜레이 (문서 기준값, 0으로 덮어쓰면 비활성화)
  SMS_MOCK_DELAY_MS: "${SMS_MOCK_DELAY_MS:-200}"
  EMAIL_MOCK_DELAY_MS: "${EMAIL_MOCK_DELAY_MS:-300}"
  PUSH_MOCK_DELAY_MS: "${PUSH_MOCK_DELAY_MS:-150}"
  KAKAO_MOCK_DELAY_MS: "${KAKAO_MOCK_DELAY_MS:-400}"
  SLACK_MOCK_DELAY_MS: "${SLACK_MOCK_DELAY_MS:-250}"
  MARKETING_HUB_MOCK_DELAY_MS: "${MARKETING_HUB_MOCK_DELAY_MS:-100}"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: points
      POSTGRES_USER: points
      POSTGRES_PASSWORD: points
    ports:
      - "19432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U points -d points"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      <<: *api-env
    ports:
      - "19080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/products || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      db:
        condition: service_healthy

  seeder:
    build:
      context: ./load-test/common
      dockerfile: Dockerfile.seed
    volumes:
      - ./load-test:/scripts
    command: bash /scripts/common/seed.sh
    depends_on:
      api:
        condition: service_healthy

  report:
    image: nginx:alpine
    volumes:
      - ./load-test/results:/usr/share/nginx/html
      - ./load-test/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "19000:80"

  # ── 부하 테스트 ─────────────────────────────────────────────────────────
  k6:
    image: grafana/k6
    volumes:
      - ./load-test:/scripts
    environment:
      - TARGET_VUS=${TARGET_VUS:-100}
    command: run -e BASE_URL=http://api:8080/api -e TARGET_VUS=${TARGET_VUS:-100} /scripts/scenarios/load/test.js
    depends_on:
      seeder:
        condition: service_completed_successfully
      report:
        condition: service_started
    profiles: [load]

  # ── 중복결제 시나리오: 초기 잔액 스냅샷 ──────────────────────────────────
  idem-snapshot:
    build:
      context: ./load-test/common
      dockerfile: Dockerfile.seed
    volumes:
      - ./load-test:/scripts
    environment:
      - TARGET_VUS=${TARGET_VUS:-20}
      - ITERATIONS=${ITERATIONS:-10}
    command: bash /scripts/scenarios/idempotency/snapshot.sh
    depends_on:
      seeder:
        condition: service_completed_successfully
    profiles: [idempotency]

  # ── 중복결제 시나리오 테스트 ────────────────────────────────────────────
  k6-idem:
    image: grafana/k6
    volumes:
      - ./load-test:/scripts
    environment:
      - TARGET_VUS=${TARGET_VUS:-20}
      - ITERATIONS=${ITERATIONS:-10}
      - CONCURRENT_REQUESTS=${CONCURRENT_REQUESTS:-2}
    command: >-
      run
      -e BASE_URL=http://api:8080/api
      -e TARGET_VUS=${TARGET_VUS:-20}
      -e ITERATIONS=${ITERATIONS:-10}
      -e CONCURRENT_REQUESTS=${CONCURRENT_REQUESTS:-2}
      /scripts/scenarios/idempotency/test.js
    depends_on:
      idem-snapshot:
        condition: service_completed_successfully
      report:
        condition: service_started
    profiles: [idempotency]

  # ── 잔액 경합 시나리오: 초기 잔액 스냅샷 ──────────────────────────────────
  balance-snapshot:
    build:
      context: ./load-test/common
      dockerfile: Dockerfile.seed
    volumes:
      - ./load-test:/scripts
    environment:
      - TARGET_VUS=${TARGET_VUS:-20}
    command: bash /scripts/scenarios/balance-race/snapshot.sh
    depends_on:
      seeder:
        condition: service_completed_successfully
    profiles: [balance-race]

  # ── 잔액 경합 시나리오 테스트 ─────────────────────────────────────────────
  k6-balance-race:
    image: grafana/k6
    volumes:
      - ./load-test:/scripts
    environment:
      - TARGET_VUS=${TARGET_VUS:-20}
      - ITERATIONS=${ITERATIONS:-10}
      - CONCURRENT_REQUESTS=${CONCURRENT_REQUESTS:-2}
    command: >-
      run
      -e BASE_URL=http://api:8080/api
      -e TARGET_VUS=${TARGET_VUS:-20}
      -e ITERATIONS=${ITERATIONS:-10}
      -e CONCURRENT_REQUESTS=${CONCURRENT_REQUESTS:-2}
      /scripts/scenarios/balance-race/test.js
    depends_on:
      balance-snapshot:
        condition: service_completed_successfully
      report:
        condition: service_started
    profiles: [balance-race]

  # ── 기프티콘 동시 Consume 시나리오 테스트 ────────────────────────────────
  k6-consume-race:
    image: grafana/k6
    volumes:
      - ./load-test:/scripts
    environment:
      - TARGET_VUS=${TARGET_VUS:-20}
      - ITERATIONS=${ITERATIONS:-10}
      - CONCURRENT_REQUESTS=${CONCURRENT_REQUESTS:-2}
    command: >-
      run
      -e BASE_URL=http://api:8080/api
      -e TARGET_VUS=${TARGET_VUS:-20}
      -e ITERATIONS=${ITERATIONS:-10}
      -e CONCURRENT_REQUESTS=${CONCURRENT_REQUESTS:-2}
      /scripts/scenarios/consume-race/test.js
    depends_on:
      seeder:
        condition: service_completed_successfully
      report:
        condition: service_started
    profiles: [consume-race]
