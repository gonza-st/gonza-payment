spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/points
    username: points
    password: points
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

pg:
  mock:
    fail-rate: ${PG_MOCK_FAIL_RATE:0.0}
    delay-ms: ${PG_MOCK_DELAY_MS:0}

sms:
  mock:
    fail-rate: ${SMS_MOCK_FAIL_RATE:0.0}
    delay-ms: ${SMS_MOCK_DELAY_MS:0}

email:
  mock:
    fail-rate: ${EMAIL_MOCK_FAIL_RATE:0.0}
    delay-ms: ${EMAIL_MOCK_DELAY_MS:0}

push:
  mock:
    fail-rate: ${PUSH_MOCK_FAIL_RATE:0.0}
    delay-ms: ${PUSH_MOCK_DELAY_MS:0}

kakao:
  mock:
    fail-rate: ${KAKAO_MOCK_FAIL_RATE:0.0}
    delay-ms: ${KAKAO_MOCK_DELAY_MS:0}

slack:
